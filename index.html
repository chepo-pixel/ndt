<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NDT Artificial Data Generator</title>
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>NDT Artificial Data Generator v2.0</h1>
      <p class="subtitle">Artificial NDT data generator</p>

      <div class="form-group">
        <label for="mdd">MDD [kg/m³]</label>
        <input id="mdd" type="text" inputmode="numeric" maxlength="4" placeholder="Example: 1914" autocomplete="off">
        <div id="mddError" class="error"></div>
        <div id="mdd95" class="result-line">95% MDD: —</div>
      </div>

      <div class="form-group">
        <label for="rows">Number of rows</label>
        <input id="rows" type="number" inputmode="numeric" min="1" max="500" step="1" placeholder="Example: 10">
        <div id="rowsError" class="error"></div>
      </div>

      <details class="advanced">
        <summary>Advanced options</summary>
        <div class="advanced-grid">
          <div class="form-group">
            <label for="gs">Particle density, Gs</label>
            <input id="gs" type="number" inputmode="decimal" min="2.00" max="3.20" step="0.01" value="2.58">
            <div id="gsError" class="error"></div>
          </div>
          <div class="form-group">
            <label for="ddMinPercent">DD min [% of MDD]</label>
            <input id="ddMinPercent" type="number" inputmode="decimal" min="80" max="120" step="0.1" value="96.5">
            <div id="ddMinError" class="error"></div>
          </div>
          <div class="form-group">
            <label for="ddMaxPercent">DD max [% of MDD]</label>
            <input id="ddMaxPercent" type="number" inputmode="decimal" min="80" max="120" step="0.1" value="100">
            <div id="ddMaxError" class="error"></div>
          </div>
        </div>
      </details>

      <button id="generateBtn">Generate data</button>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>WD [kg/m³]</th>
              <th>DD [kg/m³]</th>
              <th>M [kg/m³]</th>
              <th>%M</th>
            </tr>
          </thead>
          <tbody id="dataBody">
            <tr><td colspan="4" class="empty">No data generated</td></tr>
          </tbody>
        </table>
      </div>

      <section class="chart-section">
        <h2>Dry Density / Moisture Content Relationship</h2>
        <p class="chart-note">Dynamic curves based on current Gs. Generated points are shown after data generation.</p>
        <div class="chart-wrap">
          <canvas id="relationshipChart" width="900" height="560"></canvas>
        </div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
